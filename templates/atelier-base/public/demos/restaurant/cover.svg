<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" fill="none">
  <defs>
    <linearGradient id="cover-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a120b"/>
      <stop offset="100%" stop-color="#0f0b07"/>
    </linearGradient>
    <radialGradient id="cover-glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#c08a3a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c08a3a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="300" fill="url(#cover-bg)"/>
  <rect width="480" height="300" fill="url(#cover-glow)"/>

  <!-- Lemon tree silhouette -->
  <g transform="translate(0 200)">
    <path d="M0 100 L0 0 L480 0 L480 100 Z" fill="#0a0805"/>
    <g transform="translate(390 -30)" fill="#1f1610">
      <rect x="-3" y="0" width="6" height="32"/>
      <circle cx="-12" cy="-10" r="22"/>
      <circle cx="8" cy="-18" r="20"/>
      <circle cx="20" cy="-2" r="18"/>
      <circle cx="-2" cy="-30" r="18"/>
    </g>
    <!-- Lemons -->
    <g fill="#d6a55a">
      <ellipse cx="375" cy="-32" rx="3" ry="4"/>
      <ellipse cx="402" cy="-22" rx="3" ry="4"/>
      <ellipse cx="395" cy="-45" rx="3" ry="4"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g font-family="Fraunces, Georgia, serif" fill="#f3ebdc">
    <text x="40" y="120" font-size="48" font-weight="600" letter-spacing="0.04em">LEMONI</text>
    <text x="40" y="148" font-size="14" font-weight="400" letter-spacing="0.18em" fill-opacity="0.7">TAVERNA · NAXOS</text>
    <text x="40" y="188" font-size="13" font-weight="400" fill-opacity="0.55" font-family="Inter, sans-serif">An island taverna,</text>
    <text x="40" y="204" font-size="13" font-weight="400" fill-opacity="0.55" font-family="Inter, sans-serif">the modern way.</text>
  </g>

  <!-- Accent line -->
  <line x1="40" y1="161" x2="100" y2="161" stroke="#c08a3a" stroke-width="1.5"/>
</svg>
