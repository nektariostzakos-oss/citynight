<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#1c1814"/>
      <stop offset="60%" stop-color="#0f0c09"/>
      <stop offset="100%" stop-color="#050403"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e3c88a"/>
      <stop offset="55%" stop-color="#c9a961"/>
      <stop offset="100%" stop-color="#8a6f33"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <text x="400" y="80" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="18" letter-spacing="6" fill="#c9a961" opacity="0.7">BEFORE</text>
  <ellipse cx="400" cy="560" rx="170" ry="14" fill="#000" opacity="0.55"/>
  <!-- Shoulders -->
  <path d="M 240,560 Q 240,470 320,460 L 480,460 Q 560,470 560,560 Z" fill="url(#gold)" opacity="0.85"/>
  <!-- Neck -->
  <rect x="370" y="410" width="60" height="60" fill="url(#gold)" opacity="0.85"/>
  <!-- Head: face oval -->
  <ellipse cx="400" cy="290" rx="105" ry="135" fill="url(#gold)"/>
  <!-- Long/full hair: extra volume up top and hanging past temples -->
  <path d="M 290,260 Q 280,180 360,150 Q 400,130 440,150 Q 520,170 515,250 Q 520,310 500,340 L 290,340 Q 280,300 290,260 Z" fill="url(#gold)"/>
  <!-- Hair texture lines -->
  <path d="M 320,200 Q 350,220 340,260" stroke="#0a0806" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M 360,180 Q 380,210 370,250" stroke="#0a0806" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M 400,170 Q 410,210 405,260" stroke="#0a0806" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M 440,180 Q 460,210 455,260" stroke="#0a0806" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M 480,200 Q 500,230 495,270" stroke="#0a0806" stroke-width="2" fill="none" opacity="0.35"/>
</svg>
