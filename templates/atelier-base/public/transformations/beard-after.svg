<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#1c1814"/>
      <stop offset="60%" stop-color="#0f0c09"/>
      <stop offset="100%" stop-color="#050403"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e3c88a"/>
      <stop offset="55%" stop-color="#c9a961"/>
      <stop offset="100%" stop-color="#8a6f33"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <text x="400" y="80" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="18" letter-spacing="6" fill="#c9a961">AFTER</text>
  <ellipse cx="400" cy="560" rx="170" ry="14" fill="#000" opacity="0.55"/>
  <!-- Shoulders -->
  <path d="M 240,560 Q 240,470 320,460 L 480,460 Q 560,470 560,560 Z" fill="url(#gold)" opacity="0.85"/>
  <!-- Neck (visible now that the beard is shaped) -->
  <rect x="370" y="410" width="60" height="50" fill="url(#gold)" opacity="0.85"/>
  <!-- Head: face oval -->
  <ellipse cx="400" cy="280" rx="105" ry="130" fill="url(#gold)"/>
  <!-- Short clean hair on top -->
  <path d="M 305,220 Q 320,170 400,160 Q 480,170 495,220 L 490,240 L 310,240 Z" fill="url(#gold)"/>
  <!-- Sculpted beard: clean tapered shape following the jaw, sharp line-up at cheek -->
  <path d="M 315,320 Q 310,360 325,395 Q 345,420 380,420 L 420,420 Q 455,420 475,395 Q 490,360 485,320 Q 475,330 460,335 L 410,340 Q 390,340 370,335 L 340,335 Q 325,330 315,320 Z" fill="url(#gold)"/>
  <!-- Sharp cheekbone line -->
  <path d="M 315,320 Q 340,335 360,335" stroke="#0a0806" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 440,335 Q 460,335 485,320" stroke="#0a0806" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Mustache line -->
  <path d="M 360,300 Q 400,310 440,300" stroke="#0a0806" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>
