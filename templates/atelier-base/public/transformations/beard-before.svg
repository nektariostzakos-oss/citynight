<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#1c1814"/>
      <stop offset="60%" stop-color="#0f0c09"/>
      <stop offset="100%" stop-color="#050403"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e3c88a"/>
      <stop offset="55%" stop-color="#c9a961"/>
      <stop offset="100%" stop-color="#8a6f33"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <text x="400" y="80" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="18" letter-spacing="6" fill="#c9a961" opacity="0.7">BEFORE</text>
  <ellipse cx="400" cy="560" rx="170" ry="14" fill="#000" opacity="0.55"/>
  <!-- Shoulders -->
  <path d="M 240,560 Q 240,470 320,460 L 480,460 Q 560,470 560,560 Z" fill="url(#gold)" opacity="0.85"/>
  <!-- Neck partly hidden by big beard -->
  <rect x="370" y="410" width="60" height="60" fill="url(#gold)" opacity="0.85"/>
  <!-- Head: face oval -->
  <ellipse cx="400" cy="280" rx="105" ry="130" fill="url(#gold)"/>
  <!-- Short clean hair on top (this is the beard pair, hair stays neat) -->
  <path d="M 305,220 Q 320,170 400,160 Q 480,170 495,220 L 490,240 L 310,240 Z" fill="url(#gold)"/>
  <!-- Bushy unkempt beard: irregular bulky shape extending past jaw and below the neck -->
  <path d="M 300,320 Q 290,360 310,420 Q 320,440 340,455 Q 360,475 390,475 L 410,475 Q 440,475 460,455 Q 480,440 490,420 Q 510,360 500,320 Q 480,350 460,360 Q 440,365 420,370 L 380,370 Q 360,365 340,360 Q 320,350 300,320 Z" fill="url(#gold)"/>
  <!-- Wild beard tendrils -->
  <path d="M 330,440 Q 320,470 330,490" stroke="#0a0806" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M 370,460 Q 365,490 380,510" stroke="#0a0806" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M 420,460 Q 425,490 410,510" stroke="#0a0806" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M 470,440 Q 480,470 470,490" stroke="#0a0806" stroke-width="2" fill="none" opacity="0.3"/>
</svg>
