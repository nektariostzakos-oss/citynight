  <ellipse cx="400" cy="290" rx="105" ry="135" fill="url(#gold)"/>
  <!-- Skin fade: thin clean cap on top, tight against the skull, with razor-line hairline -->
  <path d="M 305,225 Q 320,170 400,160 Q 480,170 495,225 L 490,250 Q 480,235 470,238 L 460,232 Q 450,238 440,232 L 430,235 Q 420,232 410,235 L 400,232 Q 390,235 380,232 L 370,235 Q 360,232 350,238 L 340,232 Q 330,238 320,235 L 310,250 Z" fill="url(#gold)"/>
  <path d="M 305,225 Q 320,170 400,160 Q 480,170 495,225" stroke="#0a0806" stroke-width="2" fill="none" opacity="0.45"/>
  <!-- Subtle clean-line at the fade transition -->
  <path d="M 305,250 L 495,250" stroke="#0a0806" stroke-width="1.5" fill="none" opacity="0.3"/>
